<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Anime Vibe Rating</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Anime Vibe</h1>
    <input id="search" placeholder="Поиск аниме...">
    <button onclick="searchAnime()">🔎</button>
  </header>

  <main>
    <div id="results"></div>

    <div id="rating-panel" class="hidden">
      <h2 id="anime-title"></h2>

      <div class="slider">
        <label>Сюжет</label>
        <input type="range" min="1" max="10" id="plot">
      </div>

      <div class="slider">
        <label>Рисовка</label>
        <input type="range" min="1" max="10" id="art">
      </div>

      <div class="slider">
        <label>Персонажи</label>
        <input type="range" min="1" max="10" id="char">
      </div>

      <div class="slider">
        <label>Вайб</label>
        <input type="range" min="1" max="10" id="vibe">
      </div>

      <button onclick="saveRating()">Сохранить</button>
    </div>

    <div>
      <h2>Топ аниме</h2>
      <div id="top"></div>
    </div>

  </main>

  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
